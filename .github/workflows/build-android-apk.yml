name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build APK (EAS local)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify Expo auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is missing. Add it in GitHub: Settings > Secrets and variables > Actions"
            exit 1
          fi
          eas whoami

      - name: Print tool versions
        run: |
          node -v
          npm -v
          java -version
          eas --version

      - name: Build APK locally (no queue)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: '1'
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --local \
            --non-interactive \
            --verbose \
            --output ./build/app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: autobox-${{ github.event.inputs.profile }}-${{ github.run_number }}
          path: build/app.apk
          retention-days: 7
